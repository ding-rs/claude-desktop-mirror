name: Sync Claude Desktop

on:
  schedule:
    - cron: "47 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: claude-desktop-mirror-sync
  cancel-in-progress: false

jobs:
  sync:
    if: ${{ github.event_name == 'workflow_dispatch' || vars.MIRROR_SYNC_ENABLED == 'true' }}
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Locate Windows SDK signing tool
        shell: pwsh
        run: |
          $sdkBin = Join-Path ${env:ProgramFiles(x86)} "Windows Kits\10\bin"
          $signtool = Get-ChildItem -Path (Join-Path $sdkBin "*\x64\signtool.exe") -File -ErrorAction SilentlyContinue |
            Where-Object { $_.Directory.Parent.Name -match '^\d+(\.\d+){1,3}$' } |
            Sort-Object -Property @(
              @{ Expression = { [version]$_.Directory.Parent.Name }; Descending = $true },
              @{ Expression = { $_.FullName }; Descending = $true }
            ) |
            Select-Object -First 1
          if ($null -eq $signtool) {
            throw "No x64 signtool.exe was found under $sdkBin"
          }
          $signtool.DirectoryName | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Test
        run: pnpm test

      - name: Synchronize release
        run: pnpm sync
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
